<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR Scripts - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes holo-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes holo-border {
            0% { border-color: rgba(220,180,255,.8); box-shadow: 0 0 20px rgba(200,150,255,.4); }
            50% { border-color: rgba(180,255,220,.8); box-shadow: 0 0 20px rgba(150,255,200,.4); }
            100% { border-color: rgba(220,180,255,.8); box-shadow: 0 0 20px rgba(200,150,255,.4); }
        }

        @keyframes holo-text {
            0% { color: #9966cc; }
            50% { color: #66bb99; }
            100% { color: #9966cc; }
        }

        body {
            background: linear-gradient(120deg, #f4f0ff, #eef8ff, #eefff8, #fff0f8, #f8f0ff, #eef4ff, #f4f0ff);
            background-size: 400% 400%;
            animation: holo-bg 10s ease infinite;
            min-height: 100vh;
            padding: 2rem;
            font-family: 'Crimson Text', serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,.92), rgba(248,242,255,.85));
            border: 1.5px solid;
            padding: 2.5rem;
            border-radius: 20px;
            animation: holo-border 6s linear infinite;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(170,130,255,.15);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            animation: holo-text 6s linear infinite;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: holo-text 6s linear infinite;
            margin-bottom: .5rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: .75rem 1rem;
            background: rgba(255,255,255,.8);
            border: 1.5px solid rgba(200,150,255,.5);
            border-radius: 10px;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            color: #333;
            backdrop-filter: blur(8px);
        }

        input:focus {
            outline: none;
            background: rgba(255,255,255,.95);
            border-color: rgba(190,150,255,.8);
        }

        .btn {
            width: 100%;
            padding: .9rem;
            background: linear-gradient(135deg, rgba(190,150,255,.85), rgba(150,190,255,.85));
            color: rgba(50,30,70,.9);
            border: 1.5px solid rgba(190,150,255,.6);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: .85rem;
            letter-spacing: 2px;
            border-radius: 10px;
            transition: transform .2s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-form {
            text-align: center;
            margin-top: 1rem;
            font-size: .9rem;
            color: #666;
        }

        .toggle-form a {
            color: #9966cc;
            cursor: pointer;
            text-decoration: underline;
        }

        .error {
            color: #d32f2f;
            font-size: .85rem;
            margin-top: .5rem;
            padding: .5rem;
            background: rgba(211,47,47,.1);
            border-radius: 4px;
        }

        .success {
            color: #388e3c;
            font-size: .85rem;
            margin-top: .5rem;
            padding: .5rem;
            background: rgba(56,142,60,.1);
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(50,30,70,.3);
            border-top: 2px solid rgba(50,30,70,.9);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">⚡ NOIR</div>

        <!-- LOGIN -->
        <div id="login-form">
            <h2 style="font-family:'Orbitron';font-size:1.2rem;animation:holo-text 6s linear infinite;margin-bottom:2rem;text-align:center;text-transform:uppercase">Acceso</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" id="login-btn" onclick="loginUser()">Acceder</button>
            <div id="login-error" class="error" style="display:none"></div>
            <div class="toggle-form">
                ¿Sin cuenta? <a onclick="toggleForm()">Crear una</a>
            </div>
        </div>

        <!-- REGISTRO -->
        <div id="signup-form" class="hidden">
            <h2 style="font-family:'Orbitron';font-size:1.2rem;animation:holo-text 6s linear infinite;margin-bottom:2rem;text-align:center;text-transform:uppercase">Registrarse</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="signup-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmar</label>
                <input type="password" id="signup-confirm" placeholder="••••••••">
            </div>
            <button class="btn" id="signup-btn" onclick="signupUser()">Crear Cuenta</button>
            <div id="signup-error" class="error" style="display:none"></div>
            <div id="signup-success" class="success" style="display:none"></div>
            <div class="toggle-form">
                ¿Ya tienes cuenta? <a onclick="toggleForm()">Acceder</a>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAarGE7Z-RDk0JSozUfTMOw7IRpEWTUR78",
  authDomain: "app-df74f.firebaseapp.com",
  databaseURL: "https://app-df74f-default-rtdb.firebaseio.com",
  projectId: "app-df74f",
  storageBucket: "app-df74f.firebasestorage.app",
  messagingSenderId: "603466451706",
  appId: "1:603466451706:web:87aa5e4be5be0bb9495743",
  measurementId: "G-V2G8TQDC0Y"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function toggleForm() {
    document.getElementById('login-form').classList.toggle('hidden');
    document.getElementById('signup-form').classList.toggle('hidden');
}

function loginUser() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorDiv = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorDiv.style.display = 'none';
    errorDiv.textContent = '';

    if (!email || !password) {
        errorDiv.textContent = 'Completa todos los campos';
        errorDiv.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Accediendo...';

    auth.signInWithEmailAndPassword(email, password)
        .then(user => {
            window.location.href = 'dashboard.html';
        })
        .catch(err => {
            let msg = 'Error al acceder';
            if (err.code === 'auth/user-not-found') msg = 'Email no registrado';
            if (err.code === 'auth/wrong-password') msg = 'Contraseña incorrecta';
            if (err.code === 'auth/invalid-email') msg = 'Email inválido';
            
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Acceder';
        });
}

function signupUser() {
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;
    const errorDiv = document.getElementById('signup-error');
    const successDiv = document.getElementById('signup-success');
    const btn = document.getElementById('signup-btn');

    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    errorDiv.textContent = '';
    successDiv.textContent = '';

    if (!email || !password || !confirm) {
        errorDiv.textContent = 'Completa todos los campos';
        errorDiv.style.display = 'block';
        return;
    }

    if (password !== confirm) {
        errorDiv.textContent = 'Las contraseñas no coinciden';
        errorDiv.style.display = 'block';
        return;
    }

    if (password.length < 6) {
        errorDiv.textContent = 'Mínimo 6 caracteres';
        errorDiv.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Creando cuenta...';

    auth.createUserWithEmailAndPassword(email, password)
        .then(user => {
            db.ref('users/' + user.user.uid).set({
                email: email,
                createdAt: new Date().toISOString(),
                guiones: {}
            }, (err) => {
                if (err) {
                    errorDiv.textContent = 'Error al guardar perfil';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Crear Cuenta';
                    return;
                }
                
                successDiv.textContent = '✓ Cuenta creada. Redirigiendo...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            });
        })
        .catch(err => {
            let msg = 'Error al crear cuenta';
            if (err.code === 'auth/email-already-in-use') msg = 'Este email ya está registrado';
            if (err.code === 'auth/invalid-email') msg = 'Email inválido';
            if (err.code === 'auth/weak-password') msg = 'Contraseña muy débil';
            
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Crear Cuenta';
        });
}

// Verificar si ya está logueado
auth.onAuthStateChanged(user => {
    if (user) {
        window.location.href = 'dashboard.html';
    }
});
</script>
</body>
</html>
