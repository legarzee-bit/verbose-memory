<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Preview Holográfico</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes holo-bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes holo-border{
  0%  {border-color:rgba(220,180,255,.8);box-shadow:0 0 20px rgba(200,150,255,.4),inset 0 0 30px rgba(255,255,255,.4)}
  25% {border-color:rgba(180,255,220,.8);box-shadow:0 0 20px rgba(150,255,200,.4),inset 0 0 30px rgba(255,255,255,.4)}
  50% {border-color:rgba(255,200,240,.8);box-shadow:0 0 20px rgba(255,170,220,.4),inset 0 0 30px rgba(255,255,255,.4)}
  75% {border-color:rgba(200,230,255,.8);box-shadow:0 0 20px rgba(160,210,255,.4),inset 0 0 30px rgba(255,255,255,.4)}
  100%{border-color:rgba(220,180,255,.8);box-shadow:0 0 20px rgba(200,150,255,.4),inset 0 0 30px rgba(255,255,255,.4)}
}
@keyframes holo-text{
  0%  {color:#9966cc}25%{color:#66bb99}50%{color:#cc66aa}75%{color:#6699cc}100%{color:#9966cc}
}
@keyframes holo-btn{
  0%  {background:linear-gradient(135deg,rgba(190,150,255,.8),rgba(150,190,255,.8))}
  33% {background:linear-gradient(135deg,rgba(255,170,220,.8),rgba(190,150,255,.8))}
  66% {background:linear-gradient(135deg,rgba(150,230,190,.8),rgba(230,200,255,.8))}
  100%{background:linear-gradient(135deg,rgba(190,150,255,.8),rgba(150,190,255,.8))}
}
@keyframes shine{0%{left:-100%}100%{left:200%}}

body{
  background:linear-gradient(120deg,#f4f0ff,#eef8ff,#eefff8,#fff0f8,#f8f0ff,#eef4ff,#f4f0ff);
  background-size:400% 400%;
  animation:holo-bg 10s ease infinite;
  min-height:100vh;padding:2rem;font-family:sans-serif;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(190,140,255,.12) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 25%,rgba(140,210,255,.12) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 85%,rgba(140,255,190,.10) 0%,transparent 45%),
    radial-gradient(ellipse at 80% 85%,rgba(255,170,210,.10) 0%,transparent 45%);
  pointer-events:none;z-index:0;
}
.container{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.header{text-align:center;margin-bottom:3rem;padding-bottom:2rem;border-bottom:2px solid;animation:holo-border 6s linear infinite}
.logo{font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:6px;text-transform:uppercase;animation:holo-text 6s linear infinite}
.tagline{font-family:'Orbitron',sans-serif;letter-spacing:3px;text-transform:uppercase;font-size:.85rem;animation:holo-text 6s linear infinite;opacity:.75;margin-top:.5rem}
.grid{display:grid;grid-template-columns:360px 1fr;gap:1.5rem}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{
  background:linear-gradient(145deg,rgba(255,255,255,.88),rgba(248,242,255,.80),rgba(255,250,255,.88));
  border:1.5px solid;padding:2rem;border-radius:20px;
  animation:holo-border 6s linear infinite;
  backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(170,130,255,.10),0 2px 12px rgba(255,170,210,.08),inset 0 1px 0 rgba(255,255,255,.95);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 5s linear infinite;pointer-events:none;
}
.card-title{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:2px;animation:holo-text 6s linear infinite}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-family:'Orbitron',sans-serif;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.5rem;animation:holo-text 6s linear infinite;font-weight:700}
select,textarea{
  width:100%;padding:.7rem 1rem;
  background:rgba(255,255,255,.75);
  border:1.5px solid;color:#333;
  font-size:1rem;border-radius:12px;
  animation:holo-border 6s linear infinite;
  backdrop-filter:blur(8px);
}
select:focus,textarea:focus{outline:none;background:rgba(255,255,255,.95)}
textarea{min-height:90px;resize:vertical}
.btn{
  width:100%;padding:.9rem;
  color:rgba(50,30,70,.9);
  border:1.5px solid rgba(190,150,255,.6);
  font-family:'Orbitron',sans-serif;font-weight:700;
  text-transform:uppercase;cursor:pointer;
  font-size:.85rem;letter-spacing:2px;border-radius:12px;
  animation:holo-btn 6s linear infinite;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(170,130,255,.2);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(170,130,255,.35)}
.script-out{
  background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(250,246,255,.88));
  border:1.5px solid;padding:1.5rem;border-radius:16px;
  max-height:500px;overflow-y:auto;
  font-family:'Monaco',monospace;font-size:.83rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;color:#2a2a3a;
  animation:holo-border 6s linear infinite;
}
.placeholder{text-align:center;color:#bbb;padding:4rem 1rem;font-style:italic}
.actions{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.btn-sec{
  flex:1;padding:.65rem;
  background:rgba(255,255,255,.65);
  border:1.5px solid;
  font-family:'Orbitron',sans-serif;font-weight:600;
  text-transform:uppercase;cursor:pointer;
  font-size:.75rem;letter-spacing:1px;border-radius:10px;
  animation:holo-border 6s linear infinite,holo-text 6s linear infinite;
  transition:all .2s;backdrop-filter:blur(6px);
}
.btn-sec:hover{background:rgba(255,255,255,.95);transform:translateY(-2px)}
.word-count{font-size:.8rem;margin-top:.5rem;animation:holo-text 6s linear infinite;opacity:.7}
.badge{
  display:inline-block;padding:.3rem 1rem;
  border:1px solid;border-radius:999px;
  font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:1px;
  background:rgba(255,255,255,.55);
  animation:holo-border 6s linear infinite,holo-text 6s linear infinite;
}
.footer{text-align:center;margin-top:2rem}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.3);border-radius:3px}
::-webkit-scrollbar-thumb{border-radius:3px;background:linear-gradient(180deg,rgba(190,150,255,.7),rgba(150,190,255,.7),rgba(150,230,190,.7))}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">⚡ NOIR</div>
    <div class="tagline">Script Generator Pro</div>
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-title">Parámetros</div>
      <div class="form-group"><label>Género</label>
        <select id="genre">
          <option>Cyberpunk</option><option>Space Opera</option>
          <option>Distópico</option><option>Post-Humano</option>
          <option>Contacto Alien</option><option>Viajes en Tiempo</option>
          <option>Horror Sci-Fi</option><option>Solarpunk</option>
        </select>
      </div>
      <div class="form-group"><label>Duración</label>
        <select id="duration">
          <option>3 minutos</option><option>5 minutos</option>
          <option>10 minutos</option><option>15 minutos</option>
        </select>
      </div>
      <div class="form-group"><label>Palabras clave / Ideas</label>
        <textarea id="keywords" placeholder="Ej: traición, ciudad abandonada, IA rebelde..."></textarea>
      </div>
      <div class="form-group"><label>Tono (Opcional)</label>
        <textarea id="tone" placeholder="Ej: oscuro, épico, minimalista..." style="min-height:60px"></textarea>
      </div>
      <button class="btn" onclick="generate()">✨ Generar Guión</button>
    </div>
    <div class="card">
      <div class="card-title">Guión</div>
      <div id="output" class="script-out">
        <div class="placeholder">Configura los parámetros y genera tu guión profesional.</div>
      </div>
      <div id="wc" class="word-count"></div>
      <div id="actions" class="actions" style="display:none">
        <button class="btn-sec">📋 Copiar</button>
        <button class="btn-sec">⬇️ Descargar</button>
        <button class="btn-sec" style="border-color:rgba(255,180,210,.8)">🎬 CapCut</button>
      </div>
    </div>
  </div>
  <div class="footer"><span class="badge">54 Guiones · NOIR Scripts</span></div>
</div>
<script>
function generate(){
  const kw = document.getElementById('keywords').value.trim();
  if(!kw){alert('Ingresa palabras clave');return}
  const demo = `FADE IN.\n\nINT. NEO-TOKYO SECTOR 9 - NOCHE\n\nLluvia ácida. Neón. Drones corporativos en el cielo.\n\nKAIA (28, implantes cromados) se mueve entre sombras.\n\nLlega a un callejón. Inserta cable neural en el muro.\n\n                    KAIA\n          Treinta segundos. Nada más.\n\nSus ojos ruedan hacia atrás. Código en cascada.\n\nINT. MAINFRAME CORPORATIVO - CONTINUO\n\nFirewalls caen como dominós.\n\nINT. CALLEJÓN - CONTINUO\n\nKaia se desconecta. Sangre en la nariz.\n\nLas luces de la ciudad se apagan. Millones de pantallas muertas.\n\n                    KAIA (V.O.)\n          En un mundo de vigilancia total... somos los fantasmas.\n\nFADE OUT.`;
  document.getElementById('output').textContent = demo;
  document.getElementById('wc').textContent = demo.split(/\s+/).length + ' palabras';
  document.getElementById('actions').style.display = 'flex';
}
</script>
</body>
</html>
