<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Generator Pro - Gemini API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #0a0e27;
            --darker: #05070f;
            --accent: #00ff41;
            --accent-alt: #ff006e;
            --text: #e0e0e0;
            --muted: #8b8b8b;
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, #1a0033 50%, var(--dark) 100%);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 2rem;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-alt);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .tagline {
            color: var(--muted);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--accent);
            padding: 2rem;
            border-radius: 2px;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-alt);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            border-radius: 2px;
            transition: all 0.3s;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-alt);
            box-shadow: 0 0 15px var(--accent-alt);
            background: rgba(0, 0, 0, 0.6);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .generate-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: var(--darker);
            border: 2px solid var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .generate-btn:hover {
            background: var(--accent-alt);
            border-color: var(--accent-alt);
            box-shadow: 0 0 20px var(--accent-alt);
            transform: scale(1.02);
        }

        .generate-btn:disabled {
            background: var(--muted);
            border-color: var(--muted);
            cursor: not-allowed;
            opacity: 0.5;
            transform: scale(1);
        }

        .error-message {
            background: rgba(255, 0, 110, 0.15);
            border: 1px solid var(--accent-alt);
            color: #ff6b9d;
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .success-message {
            background: rgba(0, 255, 65, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .script-output {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent);
            padding: 1.5rem;
            border-radius: 2px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Monaco', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
        }

        .placeholder {
            text-align: center;
            color: var(--muted);
            padding: 3rem 1rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-top: 2px solid var(--accent-alt);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: var(--darker);
            box-shadow: 0 0 15px var(--accent);
        }

        .word-count {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-alt);
        }

        .api-info {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--accent);
            padding: 1rem;
            border-radius: 2px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .api-info strong {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ NOIR</div>
            <div class="tagline">Script Generator - Gemini 2.0 Flash</div>
        </div>

        <div class="grid">
            <!-- Input Panel -->
            <div class="card">
                <div class="card-title">Generador Gemini</div>

                <div class="api-info">
                    <strong>API Status:</strong> <span id="api-status">Verificando...</span>
                </div>

                <div class="form-group">
                    <label>Género Sci-Fi</label>
                    <select id="genre">
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="space-opera">Space Opera</option>
                        <option value="dystopian">Distópico</option>
                        <option value="post-human">Post-Humano</option>
                        <option value="alien-contact">Contacto Alien</option>
                        <option value="time-travel">Viajes en Tiempo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Duración</label>
                    <select id="duration">
                        <option value="3min">3 minutos</option>
                        <option value="5min">5 minutos</option>
                        <option value="10min">10 minutos</option>
                        <option value="15min">15 minutos</option>
                        <option value="30min">30 minutos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Palabras Clave / Detalles</label>
                    <textarea id="keywords" placeholder="Ej: robot vigilante, futuro distópico, rebelión, sacrificio final"></textarea>
                </div>

                <div class="form-group">
                    <label>Tono (Opcional)</label>
                    <textarea id="tone" placeholder="Ej: épico y oscuro, noir con humor, minimalista" style="min-height: 60px;"></textarea>
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button class="generate-btn" onclick="generateScript()">
                    ✨ Generar Guión
                </button>
            </div>

            <!-- Output Panel -->
            <div class="card">
                <div class="card-title">Guión</div>

                <div id="success-message" class="success-message" style="display: none;"></div>

                <div id="script-output" class="script-output">
                    <div class="placeholder">
                        Configura los parámetros y genera tu guión.
                    </div>
                </div>

                <div id="word-count" class="word-count"></div>

                <div id="action-buttons" class="action-buttons" style="display: none;">
                    <button class="action-btn" onclick="copyScript()">📋 Copiar</button>
                    <button class="action-btn" onclick="downloadScript()">⬇️ Descargar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            const apiKey = 'AIzaSyAbklHULrPHI4X_EJdudDuTm0UJE4Vsx28';
            const statusEl = document.getElementById('api-status');
            
            if (!apiKey) {
                statusEl.textContent = '⚠️ API Key no configurada';
                statusEl.style.color = '#ff6b9d';
                showError('API Key no encontrada.');
            } else {
                statusEl.textContent = '✓ Conectado (Gemini 2.0 Flash)';
                statusEl.style.color = '#00ff41';
            }
        });

        async function generateScript() {
            const genre = document.getElementById('genre').value;
            const duration = document.getElementById('duration').value;
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const apiKey = 'AIzaSyAbklHULrPHI4X_EJdudDuTm0UJE4Vsx28';
            const btn = event.target;

            if (!keywords.trim()) {
                showError('Ingresa palabras clave o detalles');
                return;
            }

            if (!apiKey) {
                showError('API Key no configurada.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> Generando...';
            hideError();
            hideSuccess();
            document.getElementById('action-buttons').style.display = 'none';

            try {
                const prompt = `Eres un escritor profesional de guiones de cine de ciencia ficción de nivel Hollywood.

PARÁMETROS:
- Género: ${genre}
- Duración: ${duration}
- Elementos: ${keywords}
${tone ? `- Tono: ${tone}` : ''}

REQUISITOS:
1. Formato screenplay profesional (FADE IN, sluglines, action, dialogue, FADE OUT)
2. Diálogos naturales e impactantes
3. Acción visual clara
4. Duración ajustada a ${duration}
5. Profesional y vendible
6. SIN clichés
7. Estructura clara: Setup → Conflicto → Clímax
8. Solo el guión, sin explicaciones

Crea un guión ÚNICO y ORIGINAL.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            maxOutputTokens: 3000,
                            temperature: 0.8,
                            topP: 0.95
                        }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || `Error: ${response.status}`);
                }

                const script = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                
                if (!script) {
                    throw new Error('No se generó contenido.');
                }

                displayScript(script);
                showSuccess('✓ Guión generado');

            } catch (error) {
                console.error('Error:', error);
                showError(`Error: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✨ Generar Guión';
            }
        }

        function displayScript(script) {
            const output = document.getElementById('script-output');
            output.textContent = script;
            
            const wordCount = script.split(/\s+/).length;
            document.getElementById('word-count').textContent = `${wordCount} palabras`;
            
            document.getElementById('action-buttons').style.display = 'flex';
        }

        function copyScript() {
            const script = document.getElementById('script-output').textContent;
            navigator.clipboard.writeText(script).then(() => {
                showSuccess('✓ Copiado');
            });
        }

        function downloadScript() {
            const script = document.getElementById('script-output').textContent;
            const genre = document.getElementById('genre').value;
            const timestamp = new Date().toISOString().slice(0, 10);
            
            const element = document.createElement('a');
            const file = new Blob([script], { type: 'text/plain' });
            element.href = URL.createObjectURL(file);
            element.download = `guion-${genre}-${timestamp}.txt`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            
            showSuccess('✓ Descargado');
        }

        function showError(msg) {
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-message').style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function hideSuccess() {
            document.getElementById('success-message').style.display = 'none';
        }
    </script>
</body>
</html>
