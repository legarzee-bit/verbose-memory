<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR Scripts - Generador con IA Groq</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0f0b1e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        h1 {
            color: #00ff41;
            font-size: 2.5em;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #ff006e;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #ff006e;
            font-size: 1.1em;
            letter-spacing: 2px;
        }

        .api-key-section {
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .api-key-section h2 {
            color: #00ff41;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input[type="password"],
        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff41;
            color: #00ff41;
            border-radius: 5px;
            font-size: 1em;
        }

        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: rgba(0, 255, 65, 0.5);
        }

        .api-info {
            background: rgba(255, 0, 110, 0.1);
            border-left: 4px solid #ff006e;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .api-info a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
        }

        .api-info a:hover {
            text-decoration: underline;
            text-shadow: 0 0 10px #00ff41;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: rgba(255, 0, 110, 0.05);
            border: 2px solid #ff006e;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.1);
        }

        label {
            display: block;
            color: #00ff41;
            font-size: 0.95em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff006e;
            color: #00ff41;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }

        select:hover {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid #00ff41;
            background: transparent;
            color: #00ff41;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        button:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-generate {
            background: linear-gradient(135deg, #00ff41, #00cc33);
            border-color: #00ff41;
        }

        .button-generate:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.8);
        }

        .output-section {
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            min-height: 200px;
        }

        .output-section h2 {
            color: #00ff41;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff41;
        }

        #script {
            background: rgba(0, 0, 0, 0.7);
            color: #00ff41;
            padding: 20px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.6;
            border: 1px solid #00ff41;
        }

        .loading {
            color: #ff006e;
            font-style: italic;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error {
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid #ff006e;
            color: #ff6b9d;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .success {
            background: rgba(0, 255, 65, 0.2);
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button.small {
            flex: 0 1 auto;
            padding: 10px 15px;
            font-size: 0.9em;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top: 3px solid #00ff41;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .pricing {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 0, 110, 0.05);
            border: 2px solid #ff006e;
            border-radius: 10px;
        }

        .plan {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .plan h3 {
            color: #00ff41;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .price {
            color: #ff006e;
            font-size: 2em;
            font-weight: bold;
            margin: 15px 0;
        }

        .price-note {
            color: #00ff41;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .features {
            text-align: left;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .features li {
            list-style: none;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #00ff41;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .api-input-group {
                flex-direction: column;
            }

            #script {
                max-height: 400px;
            }
        }

        .disclaimer {
            background: rgba(255, 165, 0, 0.1);
            border-left: 4px solid #ffa500;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            color: #ffa500;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function ScriptGenerator() {
            const [apiKey, setApiKey] = React.useState('');
            const [genre, setGenre] = React.useState('cyberpunk');
            const [duration, setDuration] = React.useState(5);
            const [script, setScript] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            const [keySet, setKeySet] = React.useState(false);

            const genres = {
                cyberpunk: 'Cyberpunk - Distopías tecnológicas, hacking, corporaciones',
                space_opera: 'Space Opera - Aventuras intergalácticas, imperios galácticos',
                dystopian: 'Distópico - Mundos post-apocalípticos, supervivencia',
                posthuman: 'Post-Humano - Transhumanismo, inteligencia artificial, consciencia',
                alien_contact: 'Contacto Alien - Encuentros extraterrestres, primeros contactos',
                time_travel: 'Viajes en Tiempo - Paradojas temporales, líneas temporales'
            };

            const handleSetApiKey = () => {
                if (apiKey.trim()) {
                    setKeySet(true);
                    setError('');
                } else {
                    setError('Por favor ingresa una API key válida');
                }
            };

            const generateScript = async () => {
                if (!apiKey.trim()) {
                    setError('API key requerida. Configúrala arriba.');
                    return;
                }

                setLoading(true);
                setError('');
                setScript('');

                const prompt = `Genera un guión de cine de ${duration} minutos en el género ${genre.replace('_', ' ')}. 

El guión debe tener:
- Formato screenplay profesional
- Sluglines (INT./EXT., LOCATION, TIME)
- Descripciones de acción en presente
- Diálogos naturales
- Nombres de personajes en mayúsculas
- Anotaciones técnicas (PAUSA, FADE, etc)

Comienza directamente con el guión, sin explicaciones.`;

                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'mixtral-8x7b-32768',
                            messages: [{
                                role: 'user',
                                content: prompt
                            }],
                            max_tokens: 2000,
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'Error en la API');
                    }

                    const data = await response.json();
                    const generatedScript = data.choices[0].message.content;
                    setScript(generatedScript);

                } catch (err) {
                    setError(`Error: ${err.message}. Verifica tu API key de Groq.`);
                }

                setLoading(false);
            };

            const copyScript = () => {
                navigator.clipboard.writeText(script);
                alert('¡Guión copiado al portapapeles!');
            };

            const downloadScript = () => {
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(script));
                element.setAttribute('download', `guion-${genre}-${Date.now()}.txt`);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            return (
                <div className="container">
                    <header>
                        <h1>🎬 NOIR SCRIPTS</h1>
                        <p className="subtitle">Generador con IA - Groq (Gratis)</p>
                    </header>

                    {!keySet && (
                        <div className="api-key-section">
                            <h2>⚙️ Configurar Groq API (Gratis)</h2>
                            <div className="api-input-group">
                                <input
                                    type="password"
                                    placeholder="Pega tu API key de Groq aquí"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <button onClick={handleSetApiKey} style={{ flex: '0 1 150px' }}>
                                    Configurar
                                </button>
                            </div>
                            <div className="api-info">
                                ℹ️ <strong>No tienes API key?</strong> Es GRATIS. Obtén la tuya en: 
                                <a href="https://console.groq.com/keys" target="_blank" rel="noopener noreferrer"> console.groq.com/keys</a>
                                <br/>
                                Tu key será almacenada solo en tu navegador (session).
                            </div>
                        </div>
                    )}

                    {keySet && (
                        <>
                            <button 
                                onClick={() => setKeySet(false)}
                                style={{ marginBottom: '20px', fontSize: '0.9em', padding: '10px 15px' }}
                            >
                                ✓ API Configurada - Cambiar Key
                            </button>

                            <div className="controls">
                                <div className="control-group">
                                    <label htmlFor="genre">Género Sci-Fi:</label>
                                    <select 
                                        id="genre"
                                        value={genre} 
                                        onChange={(e) => setGenre(e.target.value)}
                                    >
                                        {Object.entries(genres).map(([key, value]) => (
                                            <option key={key} value={key}>{value}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="control-group">
                                    <label htmlFor="duration">Duración (minutos):</label>
                                    <select 
                                        id="duration"
                                        value={duration} 
                                        onChange={(e) => setDuration(parseInt(e.target.value))}
                                    >
                                        <option value={3}>3 minutos</option>
                                        <option value={5}>5 minutos</option>
                                        <option value={10}>10 minutos</option>
                                        <option value={15}>15 minutos</option>
                                        <option value={30}>30 minutos</option>
                                    </select>
                                </div>
                            </div>

                            <div className="button-group">
                                <button 
                                    className="button-generate"
                                    onClick={generateScript} 
                                    disabled={loading}
                                >
                                    {loading ? (
                                        <>
                                            <span className="spinner"></span>
                                            Generando...
                                        </>
                                    ) : (
                                        '✨ Generar Guión con IA'
                                    )}
                                </button>
                            </div>

                            {error && <div className="error">❌ {error}</div>}

                            {script && (
                                <div className="output-section">
                                    <h2>📝 Tu Guión Generado</h2>
                                    <div id="script">{script}</div>
                                    <div className="actions">
                                        <button onClick={copyScript} className="small">📋 Copiar</button>
                                        <button onClick={downloadScript} className="small">⬇️ Descargar</button>
                                    </div>
                                </div>
                            )}

                            <div className="disclaimer">
                                <strong>⚡ Nota:</strong> Groq es 100% gratis. Tienes rate limits generosos. Si necesitas más, puedes considerar actualizar a un plan de pago en Groq, pero la versión gratuita es suficiente para la mayoría de casos.
                            </div>
                        </>
                    )}

                    {keySet && (
                        <div className="pricing">
                            <h2 style={{ gridColumn: '1 / -1', color: '#00ff41', textAlign: 'center', marginBottom: '20px' }}>
                                💰 Planes de Precios (Opcionales)
                            </h2>

                            <div className="plan">
                                <h3>🎬 Individual</h3>
                                <div className="price">GRATIS</div>
                                <p className="price-note">Groq Free Tier</p>
                                <ul className="features">
                                    <li>Generación ilimitada (con rate limit)</li>
                                    <li>6 géneros disponibles</li>
                                    <li>Descargas en TXT</li>
                                    <li>Funciona offline después</li>
                                </ul>
                            </div>

                            <div className="plan">
                                <h3>📦 Pack 3</h3>
                                <div className="price">$9.99/mes</div>
                                <p className="price-note">Groq Pro</p>
                                <ul className="features">
                                    <li>Generación sin límites</li>
                                    <li>Modelos más rápidos</li>
                                    <li>Exportar PDF</li>
                                    <li>Soporte prioritario</li>
                                </ul>
                            </div>

                            <div className="plan">
                                <h3>🎥 Studio 6</h3>
                                <div className="price">$49.99/mes</div>
                                <p className="price-note">Enterprise</p>
                                <ul className="features">
                                    <li>Todo del Plan Pack 3</li>
                                    <li>Colaboración en tiempo real</li>
                                    <li>Análisis narrativo IA</li>
                                    <li>Editor avanzado incluido</li>
                                </ul>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ScriptGenerator />, document.getElementById('root'));
    </script>
</body>
</html>
