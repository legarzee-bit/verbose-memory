<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Script Generator Pro - Sci-Fi</title>\n    <script>\n        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };\n    </script>\n    <script defer src="/_vercel/insights/script.js"></script>\n    <script crossorigin src=\"https://unpkg.com/react@18/umd/react.production.min.js\"></script>\n    <script crossorigin src=\"https://unpkg.com/react-dom@18/umd/react-dom.production.min.js\"></script>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;\n            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);\n            color: #e2e8f0;\n            min-height: 100vh;\n        }\n\n        .container {\n            max-width: 1200px;\n            margin: 0 auto;\n            padding: 2rem;\n        }\n\n        .header {\n            margin-bottom: 3rem;\n            text-align: center;\n        }\n\n        .header h1 {\n            font-size: 2.5rem;\n            margin-bottom: 0.5rem;\n            font-weight: 700;\n            letter-spacing: -0.5px;\n        }\n\n        .header p {\n            color: #94a3b8;\n            font-size: 1rem;\n        }\n\n        .grid {\n            display: grid;\n            grid-template-columns: 350px 1fr;\n            gap: 1.5rem;\n        }\n\n        @media (max-width: 768px) {\n            .grid {\n                grid-template-columns: 1fr;\n            }\n        }\n\n        .card {\n            background: rgba(15, 23, 42, 0.5);\n            border: 1px solid rgba(71, 85, 105, 0.3);\n            border-radius: 12px;\n            padding: 1.5rem;\n            backdrop-filter: blur(10px);\n        }\n\n        .card-header {\n            margin-bottom: 1.5rem;\n        }\n\n        .card-title {\n            font-size: 1.25rem;\n            font-weight: 600;\n            margin-bottom: 0.25rem;\n        }\n\n        .card-description {\n            color: #94a3b8;\n            font-size: 0.875rem;\n        }\n\n        .form-group {\n            margin-bottom: 1.5rem;\n        }\n\n        label {\n            display: block;\n            font-size: 0.875rem;\n            font-weight: 500;\n            color: #cbd5e1;\n            margin-bottom: 0.5rem;\n        }\n\n        select, textarea {\n            width: 100%;\n            padding: 0.75rem;\n            background: rgba(30, 41, 59, 0.6);\n            border: 1px solid rgba(71, 85, 105, 0.3);\n            border-radius: 8px;\n            color: #e2e8f0;\n            font-family: inherit;\n            font-size: 0.95rem;\n            transition: all 0.2s;\n        }\n\n        select:hover, textarea:hover {\n            border-color: rgba(71, 85, 105, 0.5);\n        }\n\n        select:focus, textarea:focus {\n            outline: none;\n            border-color: #3b82f6;\n            background: rgba(30, 41, 59, 0.8);\n        }\n\n        textarea {\n            min-height: 120px;\n            resize: vertical;\n        }\n\n        .button-group {\n            display: flex;\n            gap: 0.75rem;\n            margin-bottom: 1rem;\n        }\n\n        button {\n            flex: 1;\n            padding: 0.75rem 1rem;\n            background: #2563eb;\n            color: white;\n            border: none;\n            border-radius: 8px;\n            font-weight: 600;\n            cursor: pointer;\n            transition: all 0.2s;\n            font-size: 0.95rem;\n        }\n\n        button:hover {\n            background: #1d4ed8;\n            transform: translateY(-1px);\n        }\n\n        button:active {\n            transform: translateY(0);\n        }\n\n        button:disabled {\n            background: #475569;\n            cursor: not-allowed;\n            opacity: 0.5;\n        }\n\n        button.secondary {\n            background: transparent;\n            border: 1px solid rgba(71, 85, 105, 0.5);\n            color: #cbd5e1;\n        }\n\n        button.secondary:hover {\n            background: rgba(71, 85, 105, 0.1);\n        }\n\n        .error {\n            padding: 0.75rem;\n            background: rgba(239, 68, 68, 0.1);\n            border: 1px solid rgba(220, 38, 38, 0.5);\n            border-radius: 8px;\n            color: #fca5a5;\n            font-size: 0.875rem;\n            margin-bottom: 1rem;\n        }\n\n        .script-output {\n            background: rgba(5, 5, 5, 0.6);\n            border: 1px solid rgba(71, 85, 105, 0.3);\n            border-radius: 8px;\n            padding: 1.5rem;\n            font-family: 'Monaco', 'Courier New', monospace;\n            font-size: 0.85rem;\n            line-height: 1.6;\n            max-height: 500px;\n            overflow-y: auto;\n            white-space: pre-wrap;\n            word-break: break-word;\n        }\n\n        .placeholder {\n            text-align: center;\n            color: #64748b;\n            padding: 3rem 1rem;\n        }\n\n        .loading {\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            gap: 1rem;\n        }\n\n        .spinner {\n            width: 20px;\n            height: 20px;\n            border: 2px solid rgba(71, 85, 105, 0.3);\n            border-top: 2px solid #3b82f6;\n            border-radius: 50%;\n            animation: spin 1s linear infinite;\n        }\n\n        @keyframes spin {\n            to { transform: rotate(360deg); }\n        }\n\n        .badge {\n            display: inline-block;\n            padding: 0.25rem 0.75rem;\n            background: rgba(71, 85, 105, 0.2);\n            border: 1px solid rgba(71, 85, 105, 0.5);\n            border-radius: 999px;\n            font-size: 0.75rem;\n            color: #94a3b8;\n        }\n\n        ::-webkit-scrollbar {\n            width: 8px;\n        }\n\n        ::-webkit-scrollbar-track {\n            background: rgba(30, 41, 59, 0.4);\n        }\n\n        ::-webkit-scrollbar-thumb {\n            background: rgba(71, 85, 105, 0.5);\n            border-radius: 4px;\n        }\n\n        ::-webkit-scrollbar-thumb:hover {\n            background: rgba(100, 116, 139, 0.7);\n        }\n\n        .footer {\n            text-align: center;\n            margin-top: 2rem;\n            color: #64748b;\n            font-size: 0.875rem;\n        }\n    </style>\n</head>\n<body>\n    <div id=\"root\"></div>\n\n    <script>\n        const { useState } = React;\n\n        function ScriptGenerator() {\n            const [state, setState] = useState({\n                keywords: '',\n                duration: '5min',\n                genre: 'cyberpunk',\n                loading: false,\n                script: '',\n                error: ''\n            });\n\n            const scripts = {\n                cyberpunk: {\n                    '3min': `FADE IN.\\n\\nINT. NEO-TOKYO SECTOR 7 - NIGHT\\n\\nRain hammers neon-lit streets...`,\n                    '5min': `FADE IN.\\n\\nINT. THE VOID - HACKER COLLECTIVE HQ - NIGHT\\n\\nUnderground bunker...`\n                }\n            };\n\n            const generateScript = () => {\n                if (!state.keywords.trim()) {\n                    setState(prev => ({ ...prev, error: 'Ingresa palabras clave o ideas' }));\n                    return;\n                }\n\n                setState(prev => ({ ...prev, loading: true, error: '' }));\n\n                setTimeout(() => {\n                    const genreScripts = scripts[state.genre] || scripts.cyberpunk;\n                    const durationKey = state.duration;\n                    let script = genreScripts[durationKey] || genreScripts['5min'];\n\n                    setState(prev => ({ ...prev, script, loading: false }));\n                }, 800);\n            };\n\n            const copyToClipboard = () => {\n                navigator.clipboard.writeText(state.script);\n            };\n\n            const downloadScript = () => {\n                const element = document.createElement('a');\n                const file = new Blob([state.script], { type: 'text/plain' });\n                element.href = URL.createObjectURL(file);\n                element.download = `guion_${state.genre}_${Date.now()}.txt`;\n                document.body.appendChild(element);\n                element.click();\n                document.body.removeChild(element);\n            };\n\n            return (\n                <div className=\"container\">\n                    <div className=\"header\">\n                        <h1>Script Generator Pro</h1>\n                        <p>Biblioteca completa de guiones sci-fi profesionales</p>\n                    </div>\n\n                    <div className=\"grid\">\n                        <div className=\"card\">\n                            <div className=\"card-header\">\n                                <div className=\"card-title\">Parámetros</div>\n                            </div>\n\n                            <div className=\"form-group\">\n                                <label>Género</label>\n                                <select\n                                    value={state.genre}\n                                    onChange={(e) => setState(prev => ({ ...prev, genre: e.target.value }))}\n                                >\n                                    <option value=\"cyberpunk\">Cyberpunk</option>\n                                </select>\n                            </div>\n\n                            <div className=\"form-group\">\n                                <label>Duración</label>\n                                <select\n                                    value={state.duration}\n                                    onChange={(e) => setState(prev => ({ ...prev, duration: e.target.value }))}\n                                >\n                                    <option value=\"3min\">3 minutos</option>\n                                    <option value=\"5min\">5 minutos</option>\n                                </select>\n                            </div>\n\n                            <div className=\"form-group\">\n                                <label>Palabras clave / Ideas</label>\n                                <textarea\n                                    placeholder=\"Ej: robot vigilante, ciudad neon\"\n                                    value={state.keywords}\n                                    onChange={(e) => setState(prev => ({ ...prev, keywords: e.target.value }))}\n                                />\n                            </div>\n\n                            {state.error && (\n                                <div className=\"error\">{state.error}</div>\n                            )}\n\n                            <button onClick={generateScript} disabled={state.loading || !state.keywords.trim()}>\n                                {state.loading ? '⏳ Generando...' : '✨ Generar Guión'}\n                            </button>\n                        </div>\n\n                        <div className=\"card\">\n                            <div className=\"card-header\">\n                                <div className=\"card-title\">Guión</div>\n                            </div>\n\n                            {state.script ? (\n                                <>\n                                    <div className=\"script-output\">{state.script}</div>\n                                    <div className=\"button-group\" style={{ marginTop: '1rem' }}>\n                                        <button className=\"secondary\" onClick={copyToClipboard}>📋 Copiar</button>\n                                        <button className=\"secondary\" onClick={downloadScript}>⬇️ Descargar</button>\n                                    </div>\n                                </>\n                            ) : (\n                                <div className=\"placeholder\">\n                                    {state.loading ? (\n                                        <div className=\"loading\">\n                                            <div className=\"spinner\"></div>\n                                            <span>Generando guión...</span>\n                                        </div>\n                                    ) : (\n                                        <p>Configura los parámetros y genera tu guión</p>\n                                    )}\n                                </div>\n                            )}\n                        </div>\n                    </div>\n\n                    <div className=\"footer\">\n                        <span className=\"badge\">Biblioteca Completa • 18 Guiones Profesionales</span>\n                    </div>\n                </div>\n            );\n        }\n\n        ReactDOM.render(<ScriptGenerator />, document.getElementById('root'));\n    </script>\n</body>\n</html>
