<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Generator - Sci-Fi</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .card-header {
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .card-description {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select:hover, textarea:hover {
            border-color: rgba(71, 85, 105, 0.5);
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.5;
        }

        button.secondary {
            background: transparent;
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
        }

        button.secondary:hover {
            background: rgba(71, 85, 105, 0.1);
        }

        .error {
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.5);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .script-output {
            background: rgba(5, 5, 5, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .placeholder {
            text-align: center;
            color: #64748b;
            padding: 3rem 1rem;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(71, 85, 105, 0.3);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(71, 85, 105, 0.2);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 999px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.4);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.7);
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState } = React;

        function ScriptGenerator() {
            const [state, setState] = useState({
                keywords: '',
                duration: '5min',
                genre: 'cyberpunk',
                loading: false,
                script: '',
                error: ''
            });

            const handleGenerateScript = async () => {
                if (!state.keywords.trim()) {
                    setState(prev => ({ ...prev, error: 'Ingresa palabras clave o ideas' }));
                    return;
                }

                setState(prev => ({ ...prev, loading: true, error: '' }));

                // Demo: Simulate generation
                setTimeout(() => {
                    setState(prev => ({
                        ...prev,
                        script: 'FADE IN.\n\nINT. NEO-TOKYO - NIGHT\n\nScript generated successfully...',
                        loading: false
                    }));
                }, 1000);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(state.script);
            };

            const downloadScript = () => {
                const element = document.createElement('a');
                const file = new Blob([state.script], { type: 'text/plain' });
                element.href = URL.createObjectURL(file);
                element.download = `guion_${state.genre}_${Date.now()}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>Script Generator</h1>
                        <p>Genera guiones sci-fi profesionales en segundos</p>
                    </div>

                    <div className="grid">
                        <div className="card">
                            <div className="card-header">
                                <div className="card-title">Parámetros</div>
                            </div>

                            <div className="form-group">
                                <label>Género</label>
                                <select
                                    value={state.genre}
                                    onChange={(e) => setState(prev => ({ ...prev, genre: e.target.value }))}
                                >
                                    <option value="cyberpunk">Cyberpunk</option>
                                    <option value="space-opera">Space Opera</option>
                                    <option value="dystopian">Distópico</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label>Duración</label>
                                <select
                                    value={state.duration}
                                    onChange={(e) => setState(prev => ({ ...prev, duration: e.target.value }))}
                                >
                                    <option value="3min">3 minutos</option>
                                    <option value="5min">5 minutos</option>
                                    <option value="10min">10 minutos</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label>Palabras clave / Ideas</label>
                                <textarea
                                    placeholder="Ej: robot vigilante, ciudad neon, conspiración"
                                    value={state.keywords}
                                    onChange={(e) => setState(prev => ({ ...prev, keywords: e.target.value }))}
                                />
                            </div>

                            {state.error && (
                                <div className="error">{state.error}</div>
                            )}

                            <button
                                onClick={handleGenerateScript}
                                disabled={state.loading || !state.keywords.trim()}
                            >
                                {state.loading ? '⏳ Generando...' : '✨ Generar Guión'}
                            </button>
                        </div>

                        <div className="card">
                            <div className="card-header">
                                <div className="card-title">Guión</div>
                                <div className="card-description">Formato screenplay profesional</div>
                            </div>

                            {state.script ? (
                                <>
                                    <div className="script-output">{state.script}</div>
                                    <div className="button-group" style={{ marginTop: '1rem' }}>
                                        <button className="secondary" onClick={copyToClipboard}>📋 Copiar</button>
                                        <button className="secondary" onClick={downloadScript}>⬇️ Descargar</button>
                                    </div>
                                </>
                            ) : (
                                <div className="placeholder">
                                    {state.loading ? (
                                        <div className="loading">
                                            <div className="spinner"></div>
                                            <span>Generando guión...</span>
                                        </div>
                                    ) : (
                                        <p>Configura los parámetros y genera tu guión</p>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="footer">
                        <span className="badge">Script Generation Tool</span>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ScriptGenerator />, document.getElementById('root'));
    </script>
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
